# Infrastructure-only compose for local development.
# Run the server and client on the host with `npm run start:dev`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: st_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: schedule
      POSTGRES_PASSWORD: schedule
      POSTGRES_DB: schedule_teacher
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: st_redis_dev
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_dev_data:
