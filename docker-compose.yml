services:
  postgres:
    image: postgres:16-alpine
    container_name: st_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-schedule}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schedule}
      POSTGRES_DB: ${POSTGRES_DB:-schedule_teacher}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-schedule}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: st_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: st_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-schedule}:${POSTGRES_PASSWORD:-schedule}@postgres:5432/${POSTGRES_DB:-schedule_teacher}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
    ports:
      - '3001:3001'

  client:
    build:
      context: ./client
    container_name: st_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001/api/v1
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
